version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: nikahin-app:latest
    container_name: nikahin-web
    restart: always
    ports:
      - "3000:3000"
    # Load environment variables from the .env file in the host
    env_file:
      - .env
    environment:
      - NODE_ENV=production
